<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/main.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <title>2026 종합설계 33조</title>
</head>
<body>
    <h2>Semgrep 소스 코드 취약점 스캐너</h2>

    <form id="scanForm">
        <div class="input-group">
            <strong>방법 1: 파일 업로드</strong><br>
            <input type="file" id="codeFile" name="code_file" style="margin-top: 10px;">
            <p style="font-size: 12px; color: #666;">(파일을 업로드하면 확장자를 자동 인식하여 검사합니다)</p>
        </div>

        <div class="input-group">
            <strong>방법 2: 코드 직접 입력</strong><br>
            <textarea id="codeText" name="code_text" rows="10" placeholder="여기에 검사할 코드를 붙여넣으세요..."></textarea>
            <select name="language" style="margin-top: 10px; padding: 5px;">
                <option value=".py">Python</option>
                <option value=".js">JavaScript</option>
                <option value=".java">Java</option>
                <option value=".c">C/C++</option>
            </select>
        </div>

        <button type="button" onclick="runScanner()">검사 시작</button>
    </form>

    <h3>스캔 결과</h3>
    <pre id="resultOutput">결과가 여기에 표시됩니다.</pre>

    <script src="/static/main.js" type="text/JavaScript">

    </script>
</body>
</html>
